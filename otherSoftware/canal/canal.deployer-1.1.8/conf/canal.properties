#################################################
######### 		Common Global Settings		#############
#################################################

# 【网络绑定】Canal Server 绑定的 IP 地址。
# 留空表示绑定所有网卡 (0.0.0.0)。如果在多网卡服务器，建议指定内网 IP。
canal.ip =

# 【注册 IP】注册到 Zookeeper 的 IP 地址。
# 用于集群模式下，其他节点通过此 IP 找到当前节点。通常留空自动获取，或在 Docker/复杂网络环境下手动指定。
canal.register.ip =

# 【TCP 端口】Canal Server 监听客户端连接的端口。
# 默认 11111，客户端（如 canal-client）通过此端口拉取数据。
canal.port = 11111

# 【Metrics 端口】用于暴露监控指标（Prometheus 等）的端口。
canal.metrics.pull.port = 11112

# 【基础认证】Canal 实例的用户名和密码（用于客户端连接验证）。
# 生产环境建议开启，默认注释掉表示不开启验证。
# canal.user = canal
# canal.passwd =

# -----------------------------------------------------
# 【Canal Admin 控制台配置】
# 如果使用了 canal-admin 进行可视化管理，需配置以下项
# -----------------------------------------------------

# Canal Admin 管理服务的地址 (IP:Port)
#canal.admin.manager = 127.0.0.1:8089

# 当前实例在 Admin 控制台中监听的端口
canal.admin.port = 11110

# 连接 Admin 控制台的账号密码
canal.admin.user = admin
canal.admin.passwd =

# 【自动注册】是否自动注册到 Admin 控制台
# true: 启动时自动注册; false: 需手动在控制台添加
#canal.admin.register.auto = true

# 注册到的集群名称
#canal.admin.register.cluster =

# 注册后的实例名称
#canal.admin.register.name =

# -----------------------------------------------------
# 【Zookeeper 配置】
# 用于集群模式下的主节点选举和元数据存储
# -----------------------------------------------------

# Zookeeper 集群地址列表 (格式：ip:port,ip:port)
# 单机模式可留空
canal.zkServers =

# 刷新元数据到 ZK 的频率 (毫秒)
canal.zookeeper.flush.period = 1000

# 是否不使用 Netty 框架 (通常保持 false)
canal.withoutNetty = false

# 【服务端模式】数据投递的目标模式
# 可选值：tcp (默认), kafka, rocketMQ, rabbitMQ, pulsarMQ
# 如果对接消息队列，请修改此处
canal.serverMode = tcp

# -----------------------------------------------------
# 【文件存储配置】
# 用于将 meta 信息（binlog position 等）持久化到本地文件
# -----------------------------------------------------

# 数据文件根目录，默认指向 conf 目录
canal.file.data.dir = ${canal.conf.dir}

# 刷新元数据到文件的频率 (毫秒)
canal.file.flush.period = 1000

# -----------------------------------------------------
# 【内存存储配置 (RingBuffer)】
# Canal 内部用于暂存解析后的 binlog 数据的环形缓冲区
# -----------------------------------------------------

# RingBuffer 的大小 (条目数)，必须是 2 的幂 (如 16384, 32768)
# 值越大能缓存越多数据，但占用内存越多
canal.instance.memory.buffer.size = 16384

# RingBuffer 中每个单元占用的内存大小 (字节)，默认 1KB
canal.instance.memory.buffer.memunit = 1024 

# 获取数据的模式：MEMSIZE (按内存大小) 或 ITEMSIZE (按条目数)
canal.instance.memory.batch.mode = MEMSIZE

# 是否保留原始 entry 数据 (true 性能更好，推荐)
canal.instance.memory.rawEntry = true

# -----------------------------------------------------
# 【心跳检测配置】
# 用于检测 MySQL 主库是否存活
# -----------------------------------------------------

# 是否启用心跳检测
canal.instance.detecting.enable = false

# 心跳检测执行的 SQL 语句
# 默认 'select 1'，也可配置写入特定表来测试主从同步延迟
#canal.instance.detecting.sql = insert into retl.xdual values(1,now()) on duplicate key update x=now()
canal.instance.detecting.sql = select 1

# 心跳检测间隔时间 (秒)
canal.instance.detecting.interval.time = 3

# 重试阈值，连续失败多少次判定为宕机
canal.instance.detecting.retry.threshold = 3

# 是否启用基于心跳的高可用切换 (通常配合 HA 机制)
canal.instance.detecting.heartbeatHaEnable = false

# -----------------------------------------------------
# 【事务与故障处理】
# -----------------------------------------------------

# 支持的最大事务大小。超过此大小的事务会被切分成多个批次投递
# 单位：条目数 (默认 1024)
canal.instance.transaction.size =  1024

# MySQL 主库故障转移后，回退到新主库的重试间隔 (秒)
canal.instance.fallbackIntervalInSeconds = 60

# -----------------------------------------------------
# 【网络参数优化】
# -----------------------------------------------------

# TCP 接收缓冲区大小 (字节)
canal.instance.network.receiveBufferSize = 16384
# TCP 发送缓冲区大小 (字节)
canal.instance.network.sendBufferSize = 16384
# Socket 超时时间 (秒)
canal.instance.network.soTimeout = 30

# -----------------------------------------------------
# 【Binlog 过滤配置】
# 控制哪些类型的 SQL 或操作会被过滤掉不投递
# -----------------------------------------------------

# 是否过滤 Druid 产生的 DDL (通常开启以避免噪音)
canal.instance.filter.druid.ddl = true
# 是否过滤权限管理相关的 DCL (grant/revoke 等)
canal.instance.filter.query.dcl = false
# 是否过滤普通查询 DML (select 等，通常不过滤)
canal.instance.filter.query.dml = false
# 是否过滤 DDL (create/alter 等)
canal.instance.filter.query.ddl = false
# 遇到解析错误的表是否抛出异常 (false 表示跳过错误表继续运行)
canal.instance.filter.table.error = false
# 是否过滤行级别数据 (谨慎开启，可能导致数据丢失)
canal.instance.filter.rows = false
# 是否过滤事务开始/结束标记
canal.instance.filter.transaction.entry = false
# 具体操作过滤 (insert/update/delete)，false 表示不过滤，即正常同步
canal.instance.filter.dml.insert = false
canal.instance.filter.dml.update = false
canal.instance.filter.dml.delete = false

# -----------------------------------------------------
# 【Binlog 格式检查】
# 启动时检查 MySQL 的 binlog_format 和 binlog_image 是否符合要求
# -----------------------------------------------------

# 允许的 binlog 格式 (推荐 ROW)
canal.instance.binlog.format = ROW,STATEMENT,MIXED 
# 允许的 binlog 镜像模式 (推荐 FULL，MINIMAL 可能丢失旧值)
canal.instance.binlog.image = FULL,MINIMAL,NOBLOB

# 是否在隔离环境中获取 DDL (高级特性，通常关闭)
canal.instance.get.ddl.isolation = false

# -----------------------------------------------------
# 【并行解析配置】
# 提升大事务或高并发下的解析性能
# -----------------------------------------------------

# 是否开启并行解析
canal.instance.parser.parallel = true

# 并行线程数。默认不配则根据 CPU 核数 * 60% 自动计算
# 建议不要超过服务器可用 CPU 核数
#canal.instance.parser.parallelThreadSize = 16

# Disruptor 环形缓冲区大小，必须是 2 的幂
canal.instance.parser.parallelBufferSize = 256

# -----------------------------------------------------
# 【Table Meta TSDB (元数据存储)】
# 用于记录表结构变更历史，解决 binlog 中只有 ID 没有字段名的问题
# -----------------------------------------------------

# 是否启用 TSDB (强烈建议开启，否则表结构变更后可能解析失败)
canal.instance.tsdb.enable = true

# TSDB 数据存放目录
canal.instance.tsdb.dir = ${canal.file.data.dir:../conf}/${canal.instance.destination:}

# TSDB 数据库连接 URL (默认使用嵌入式 H2 数据库)
canal.instance.tsdb.url = jdbc:h2:${canal.instance.tsdb.dir}/h2;CACHE_SIZE=1000;MODE=MYSQL;

# TSDB 数据库用户名/密码
canal.instance.tsdb.dbUsername = canal
canal.instance.tsdb.dbPassword = canal

# 快照保存间隔 (小时)，默认 24 小时
canal.instance.tsdb.snapshot.interval = 24

# 快照过期清理时间 (小时)，默认 360 小时 (15 天)
canal.instance.tsdb.snapshot.expire = 360


#################################################
######### 		Destinations (实例配置)		#############
#################################################

# 定义要运行的 Canal 实例名称 (对应 conf/example 目录)
# 多个实例用逗号分隔，如：example,test1
canal.destinations = example

# 配置文件根目录
canal.conf.dir = ../conf

# 是否自动扫描实例目录的变化 (新增/删除文件夹自动启动/停止实例)
canal.auto.scan = true
# 自动扫描间隔 (秒)
canal.auto.scan.interval = 5

# 【重要】当找不到 binlog position 时的行为
# true: 跳过缺失部分，直接从最新位置开始消费 (会导致数据丢失)
# false: 报错并停止 (生产环境强烈建议保持 false，确保数据一致性)
canal.auto.reset.latest.pos.mode = false

# TSDB 的 Spring 配置文件路径
# 默认使用 H2 (本地文件)，如需高性能可改为 mysql-tsdb.xml (需额外配置 MySQL)
canal.instance.tsdb.spring.xml = classpath:spring/tsdb/h2-tsdb.xml
#canal.instance.tsdb.spring.xml = classpath:spring/tsdb/mysql-tsdb.xml

# 实例全局管理模式 (spring 模式)
canal.instance.global.mode = spring
canal.instance.global.lazy = false

# 如果使用了 canal-admin，这里会动态替换为 admin 地址
canal.instance.global.manager.address = ${canal.admin.manager}

# 实例加载的具体 Spring XML 配置
# file-instance.xml: 基于文件的元数据存储 (默认)
# memory-instance.xml: 纯内存 (重启丢失 position，仅测试用)
canal.instance.global.spring.xml = classpath:spring/file-instance.xml
#canal.instance.global.spring.xml = classpath:spring/default-instance.xml


##################################################
######### 	      MQ Properties (通用)     #############
##################################################

# 阿里云 AK/SK (如果使用阿里云 RDS 或 MQ 服务需填写)
canal.aliyun.accessKey =
canal.aliyun.secretKey =
canal.aliyun.uid=

# 是否将消息展平 (flatMessage: true 表示将一行数据转为扁平 JSON，方便消费)
canal.mq.flatMessage = true

# 批量发送的最大条数
canal.mq.canalBatchSize = 50

# 批量发送的最大等待时间 (毫秒)，达到时间或条数即发送
canal.mq.canalGetTimeout = 100

# 访问通道：local (本地) 或 cloud (阿里云消息追踪)
canal.mq.accessChannel = local

# 是否根据 database 名称进行 hash 分区 (保证同一库的数据有序)
canal.mq.database.hash = true

# 发送线程池大小
canal.mq.send.thread.size = 30

# 构建消息的线程池大小
canal.mq.build.thread.size = 8


##################################################
######### 		     Kafka 配置	     #############
##################################################
# 当 canal.serverMode = kafka 时生效

# Kafka 集群地址
kafka.bootstrap.servers = 127.0.0.1:9092

# 确认机制：all 表示所有副本确认后才算发送成功 (最安全)
kafka.acks = all

# 压缩类型：none, gzip, snappy, lz4, zstd
kafka.compression.type = none

# 批量发送大小 (字节)
kafka.batch.size = 16384

# 发送延迟 (毫秒)，用于合并小批量请求
kafka.linger.ms = 1

# 最大请求大小
kafka.max.request.size = 1048576

# 生产者缓冲区内存
kafka.buffer.memory = 33554432

# 每个连接最大未确认请求数 (设为 1 保证严格顺序，但降低吞吐)
kafka.max.in.flight.requests.per.connection = 1

# 重试次数 (0 表示不重试，依赖上层逻辑)
kafka.retries = 0

# Kerberos 认证配置 (如需安全认证则开启)
kafka.kerberos.enable = false
kafka.kerberos.krb5.file = ../conf/kerberos/krb5.conf
kafka.kerberos.jaas.file = ../conf/kerberos/jaas.conf

# SASL 认证示例 (SCRAM 机制)
# kafka.sasl.jaas.config = org.apache.kafka.common.security.scram.ScramLoginModule required \\n username=\"alice\" \\npassword="alice-secret\";
# kafka.sasl.mechanism = SCRAM-SHA-512
# kafka.security.protocol = SASL_PLAINTEXT


##################################################
######### 		   RocketMQ 配置	     #############
##################################################
# 当 canal.serverMode = rocketMQ 时生效

# 生产者组名称
rocketmq.producer.group = test

# 是否开启消息轨迹
rocketmq.enable.message.trace = false
rocketmq.customized.trace.topic =

# 命名空间
rocketmq.namespace =

# NameServer 地址
rocketmq.namesrv.addr = 127.0.0.1:9876

# 发送失败重试次数
rocketmq.retry.times.when.send.failed = 0

# 是否启用 VIP 通道 (某些网络环境需关闭)
rocketmq.vip.channel.enabled = false

# 消息 Tag
rocketmq.tag = 


##################################################
######### 		   RabbitMQ 配置	     #############
##################################################
# 当 canal.serverMode = rabbitMQ 时生效

rabbitmq.host =
rabbitmq.virtual.host =
rabbitmq.exchange =
rabbitmq.username =root
rabbitmq.password =root
rabbitmq.queue =
rabbitmq.routingKey =
rabbitmq.deliveryMode =


##################################################
######### 		     Pulsar 配置         #############
##################################################
# 当 canal.serverMode = pulsarMQ 时生效

pulsarmq.serverUrl =
pulsarmq.roleToken =
pulsarmq.topicTenantPrefix =