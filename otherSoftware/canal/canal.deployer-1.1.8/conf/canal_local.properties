#################################################
######### 		Canal Admin Integration		#############
#################################################

# 【注册 IP】
# 指定当前 Canal Server 注册到 Admin 控制台时展示的 IP 地址。
# - 留空：默认自动获取本机网卡 IP。
# - 场景：如果服务器有多个网卡（如同时有内网/外网），或者运行在 Docker/K8s 中，
#   自动获取的 IP 可能无法被 Admin 控制台或其他节点访问，此时需手动指定可访问的内网 IP。
canal.register.ip =

# -----------------------------------------------------
# 【Canal Admin 管理服务连接配置】
# 指向部署好的 canal-admin 服务端地址
# -----------------------------------------------------

# 【Admin 地址】
# Canal Admin 管理后台的服务地址 (格式：IP:端口)。
# Canal Server 启动后会连接此地址进行心跳汇报和配置拉取。
# 默认端口通常为 8089。
canal.admin.manager = 127.0.0.1:8089

# 【监听端口】
# 当前 Canal Server 实例监听 Admin 指令的端口。
# Admin 控制台会通过此端口向 Server 发送启动、停止、重载配置等指令。
# 注意：此端口不能与 canal.port (默认11111) 冲突。
canal.admin.port = 11110

# 【认证账号】
# 连接 Admin 控制台所需的用户名。
# 需在 Admin 控制台中已存在该用户，且拥有管理权限。
canal.admin.user = admin

# 【认证密码】
# 对应用户的密码。
# ⚠️ 安全提示：生产环境中务必填写密码，不要留空。
canal.admin.passwd =

# -----------------------------------------------------
# 【自动注册策略】
# 控制当前节点如何加入集群
# -----------------------------------------------------

# 【自动注册开关】
# true: 启动时自动向 Admin 控制台注册当前节点。
# false: 需要在 Admin 控制台手动添加机器信息。
# 推荐设为 true，方便运维自动化。
canal.admin.register.auto = true

# 【集群名称】
# 当前节点所属的逻辑集群名称。
# - 留空：通常表示使用默认集群或根据上下文推断。
# - 填写：用于将多个 Canal Server 节点划分为不同的组（例如：集群A、集群B），
#   便于在 Admin 控制台中按业务线隔离管理。
canal.admin.register.cluster =

# 【实例名称】
# 注册到 Admin 控制台后显示的节点名称/别名。
# - 留空：默认使用主机名或自动生成。
# - 填写：自定义易识别的名称（如：canal-node-01, beijing-idc-server），
#   方便在管理界面中快速定位具体机器。
canal.admin.register.name = 