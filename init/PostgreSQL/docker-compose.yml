version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: root        # 数据库用户名
      POSTGRES_PASSWORD: root    # 数据库密码
      POSTGRES_DB: db            # 默认创建的数据库
    ports:
      - "5432:5432"              # 宿主机端口:容器端口
    volumes:
      - ./data:/var/lib/postgresql/data
