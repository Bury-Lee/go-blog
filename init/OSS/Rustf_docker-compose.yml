version: '3.8'

services:
  rustfs:
    image: rustfs/rustfs:latest
    container_name: rustfs-storage
    restart: unless-stopped
    ports:
      - "9000:9000"  # S3 API 端口
      - "9001:9001"  # Web 控制台端口
    volumes:
      - ./data:/data     # 数据文件存储在本地 ./data 目录
      - ./logs:/logs     # 日志文件存储在本地 ./logs 目录
    environment:
      - RUSTFS_ACCESS_KEY=admin      # 账号
      - RUSTFS_SECRET_KEY=123456     # 密码