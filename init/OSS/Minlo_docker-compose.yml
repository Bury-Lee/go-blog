version: '3.8'

services:
  minio:
    image: minio/minio:latest
    container_name: minio-storage
    restart: unless-stopped
    
    # 端口映射：9000(S3 API) + 9001(Web控制台)
    ports:
      - "9000:9000"
      - "9001:9001"
    
    # 数据持久化
    volumes:
      - ./data:/data
      - ./logs:/var/log/minio
    
    # 启动命令 + 环境变量
    command: server /data --console-address ":9001"
    
    environment:
      # 管理员账号（必须设置，否则随机生成）
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-admin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-change_this_strong_password}
      
      # 可选：启用HTTPS（生产环境建议开启）
      # - MINIO_SERVER_URL=https://cdn.yourdomain.com
      # - MINIO_BROWSER_REDIRECT_URL=https://console.yourdomain.com
      
      # 可选：配置通知/日志
      - MINIO_AUDIT_WEBHOOK_ENABLE=off
      - MINIO_LOGGER_WEBHOOK_ENABLE=off
      
      # 可选：Erasure Coding配置（多磁盘冗余）
      # - MINIO_STORAGE_CLASS_STANDARD=EC:2
      # - MINIO_STORAGE_CLASS_RRS=EC:1
    
    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 60s
    
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # 可选：Nginx反向代理（HTTPS + 域名）
  nginx:
    image: nginx:alpine
    container_name: minio-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      minio:
        condition: service_healthy
    profiles:
      - "with-proxy"

  # 可选：Redis缓存层（高频访问加速）
  redis:
    image: redis:7-alpine
    container_name: minio-redis
    restart: unless-stopped
    volumes:
      - ./redis-data:/data
    command: redis-server --appendonly yes --maxmemory 512mb
    profiles:
      - "with-cache"
    deploy:
      resources:
        limits:
          memory: 512M

  # 可选：Prometheus监控（MinIO原生支持）
  prometheus:
    image: prom/prometheus:latest
    container_name: minio-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus-data:/prometheus
    profiles:
      - "with-monitoring"

# 网络配置
networks:
  minio-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16

# 数据卷
volumes:
  minio-data:
    driver: local
  minio-logs:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local